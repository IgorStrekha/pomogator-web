<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProBazis — Сброс пароля</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #12121F; color: #fff; }
    .box { text-align: center; padding: 32px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,214,0,0.3);
               border-top-color: #FFD600; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,0.6); font-size: 14px; }
    .error { color: #E31E24; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Открываем ProBazis...</p>
</div>
<script>
  (function() {
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function(p) {
      var idx = p.indexOf('=');
      if (idx > 0) params[p.substring(0, idx)] = decodeURIComponent(p.substring(idx + 1));
    });
    if (params.error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').className = 'error';
      document.getElementById('msg').textContent = params.error_description || params.error;
      return;
    }
    if (params.access_token && params.refresh_token) {
      var url = 'probazis://auth/reset'
        + '?access_token=' + encodeURIComponent(params.access_token)
        + '&refresh_token=' + encodeURIComponent(params.refresh_token);
      window.location.href = url;
      setTimeout(function() {
        document.getElementById('msg').textContent =
          'Если приложение не открылось — убедитесь что ProBazis установлен.';
      }, 2000);
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').className = 'error';
      document.getElementById('msg').textContent = 'Ссылка недействительна или устарела.';
    }
  })();
</script>
</body>
</html>
